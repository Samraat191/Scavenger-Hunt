<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="./dvd.png" />
    <title>Random Stuff wow!</title>
    <style>
      @keyframes pop1 {
        0% {
          opacity: 1;
        }
        
        20% {
          opacity: 0;
        }
        
        80% {
          opacity: 1;
        }
        
        100% {
          opacity: 0;
        }
      }
      
      @keyframes pop2 {
        0% {
          opacity: 1;
        }
        
        35% {
          opacity: 0;
        }
        
        65% {
          opacity: 1;
        }
        
        100% {
          opacity: 0;
        }
      }
      
      .box {
        width: 100px;
        height: 100px;
        border: 3px solid #222222;
        border-radius: 10px;
        position: fixed;
      }
      
      #start {
        color: #EEEEEE;
        background-color: #0c0e14;
        width: 200px;
        height: 100px;
        border: 10px double #333333;
        border-radius: 40px;
        font-size: 32px;
        font-family: fantasy;
        position: fixed;
      }
      
      #start:hover {
        border-color: #EEEEEE;
      }
    </style>
    <link rel="stylesheet" href="./style2.css" />
  </head>
  <body>
    <div id="start-container"><button id="start">Start</button></div>
    <!-- Make Simon (Inspired by SJGMHS Flag 1) -->
    <h1>
      Wow... You found all the sECrETS??
    </h1>
    <h2>
      One More Puzzle Before It's Over. Good Luck!
    </h2>
    <hr/>
    <div class="box" id="blue1" style="background-color: dodgerblue;"></div>
    <div class="box" id="red" style="background-color: red;"></div>
    <div class="box" id="green" style="background-color: green;"></div>
    <div class="box" id="orange" style="background-color: orange;"></div>
    <div class="box" id="purple" style="background-color: purple;"></div>
    <div class="box" id="pink" style="background-color: pink;"></div>
    <div class="box" id="yellow" style="background-color: yellow;"></div>
    <div class="box" id="blue2" style="background-color: blue;"></div>
  </body>
  <script src="./final.js" defer></script>
</html>
